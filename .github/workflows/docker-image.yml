name: Build, Scan, and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # SCA: OWASP Dependency Check
      # ---------------------------
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: ${{ github.repository }}
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      # ---------------------------
      # SAST: Semgrep
      # ---------------------------
      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            .

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      # ---------------------------
      # Container build + push
      # ---------------------------
      - name: Set lowercase image name
        run: echo "IMAGE_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_LC }}:latest
            ghcr.io/${{ env.IMAGE_LC }}:${{ github.sha }}

      # ---------------------------
      # Container scan: Trivy
      # ---------------------------
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ env.IMAGE_LC }}:latest
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ---------------------------------------
  # OPTIONAL: CodeQL job
  # Enable this after setting your language.
  # For private repos, GitHub Advanced Security may be required.
  # ---------------------------------------
  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Change this to match your repo.
          # Examples:
          # - language: javascript-typescript
          #   build-mode: none
          # - language: python
          #   build-mode: none
          # - language: java
          #   build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
